name: Publish to PyPI

on:
  push:
    tags:
      - '*'

jobs:
  test:
    uses: ./.github/workflows/python-tests.yaml

  publish:
    needs: test
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Verify version match
        run: |
          # Extract the tag name from GITHUB_REF (e.g., refs/tags/v0.1.1 -> v0.1.1 or refs/tags/0.1.1 -> 0.1.1)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Strip the 'v' prefix if it exists for comparison
          TAG_VERSION=${TAG_NAME#v}
          
          # Extract version from pyproject.toml
          PROJECT_VERSION=$(grep -m 1 '^version = ' pyproject.toml | awk -F'"' '{print $2}')
          
          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"
          
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
