name: Python tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure devenv binary cache
        uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv.sh
        run: nix profile add --accept-flake-config github:cachix/devenv/latest

      - name: Run tests
        run: devenv test
