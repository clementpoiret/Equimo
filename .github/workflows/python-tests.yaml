name: Python tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure devenv binary cache
        uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv.sh
        # Security mitigation: Explicitly accept the flake configuration from the upstream provider. 
        # Using the `cachix/devenv` flake reference guarantees we pull the validated release closure 
        # rather than relying on the arbitrary state of the local `nixpkgs` channel which may have an 
        # incompatible or stale devenv derivation.
        run: nix profile install --accept-flake-config github:cachix/devenv/latest
